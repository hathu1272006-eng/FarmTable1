<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../assets/logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tài khoản của tôi | FarmTable</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="../CSS/style.css" />
  <style>
    .acc-tab.active { border-color: #40916C; color: #40916C; font-weight: 600; }
    .acc-tab:not(.active) { border-color: transparent; color: #6b7280; font-weight: 500; }
    .acc-pane { display: none; }
    .acc-pane.active { display: block; }
    .auth-tab.active { border-bottom-color: #40916C; color: #1B4332; font-weight: 700; }
    .auth-tab:not(.active) { border-bottom-color: transparent; color: #9ca3af; }
    .auth-pane { display: none; }
    .auth-pane.active { display: block; }
  </style>
</head>
<body class="min-h-screen bg-[#F0FDF4] text-[#1F2937] flex flex-col font-sans">

  <div id="navbar-container"></div>

  <div class="bg-[#F8F3EC] py-3">
    <div class="max-w-[1200px] mx-auto px-4 md:px-8 flex items-center gap-2 text-[14px] text-gray-500">
      <a href="index.html" class="hover:text-[#40916C]">Trang chủ</a>
      <span>/</span>
      <span class="text-[#1B4332] font-semibold">Tài khoản của tôi</span>
    </div>
  </div>

  <main class="flex-1">
    <div class="max-w-[1200px] mx-auto px-4 md:px-0 py-10">

      <!-- ============ GUEST: LOGIN / REGISTER ============ -->
      <div id="guest-view" class="hidden max-w-[440px] mx-auto bg-white rounded-2xl border border-[#E5E7EB] shadow-sm p-8">
        <div class="flex gap-8 border-b border-gray-200 mb-6">
          <button class="auth-tab active pb-3 border-b-2 whitespace-nowrap" data-auth-tab="login">Đăng nhập</button>
          <button class="auth-tab pb-3 border-b-2 whitespace-nowrap" data-auth-tab="register">Đăng ký</button>
        </div>

        <div id="auth-pane-login" class="auth-pane active">
          <form id="login-form" class="flex flex-col gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
              <input id="login-email" type="email" required placeholder="ban@email.com"
                class="w-full h-11 px-4 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-[#40916C]" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
              <input id="login-password" type="password" required placeholder="••••••••"
                class="w-full h-11 px-4 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-[#40916C]" />
            </div>
            <div id="login-error" class="hidden text-sm text-red-600 bg-red-50 rounded-lg px-3 py-2"></div>
            <button type="submit" class="w-full h-11 bg-[#40916C] hover:bg-[#2D6A4F] text-white rounded-xl font-bold text-[15px] transition-colors">Đăng nhập</button>
            <p class="text-xs text-gray-400 text-center">Demo: đăng ký tài khoản mới ở tab bên cạnh để dùng thử.</p>
            <p class="text-xs text-center text-gray-500">Đặt hàng không cần tài khoản? <a href="track-order.html" class="text-[#40916C] font-medium hover:underline">Tra cứu đơn hàng tại đây</a></p>
          </form>
        </div>

        <div id="auth-pane-register" class="auth-pane">
          <form id="register-form" class="flex flex-col gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Họ và tên</label>
              <input id="reg-name" type="text" required class="w-full h-11 px-4 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-[#40916C]" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
              <input id="reg-email" type="email" required class="w-full h-11 px-4 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-[#40916C]" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Số điện thoại</label>
              <input id="reg-phone" type="tel" pattern="[0-9]{9,11}" required class="w-full h-11 px-4 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-[#40916C]" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
              <input id="reg-password" type="password" required minlength="4" class="w-full h-11 px-4 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-[#40916C]" />
            </div>
            <div id="register-error" class="hidden text-sm text-red-600 bg-red-50 rounded-lg px-3 py-2"></div>
            <button type="submit" class="w-full h-11 bg-[#40916C] hover:bg-[#2D6A4F] text-white rounded-xl font-bold text-[15px] transition-colors">Đăng ký</button>
          </form>
        </div>
      </div>

      <!-- ============ LOGGED IN: ACCOUNT ============ -->
      <div id="account-view" class="hidden flex flex-col gap-6">
        <div class="flex items-center gap-4">
          <div id="account-avatar" class="w-16 h-16 rounded-full bg-[#40916C] text-white text-2xl font-bold flex items-center justify-center flex-shrink-0"></div>
          <div>
            <h1 id="account-greeting" class="text-2xl font-bold text-[#1B4332]"></h1>
            <p id="account-email" class="text-gray-500 text-sm"></p>
          </div>
        </div>

        <div class="flex gap-8 border-b border-gray-200 overflow-x-auto">
          <button class="acc-tab active pb-3 border-b-2 whitespace-nowrap" data-acc-tab="profile">Thông tin tài khoản</button>
          <button class="acc-tab pb-3 border-b-2 whitespace-nowrap" data-acc-tab="orders">Đơn hàng của tôi</button>
          <button class="acc-tab pb-3 border-b-2 whitespace-nowrap" data-acc-tab="wishlist">Sản phẩm yêu thích</button>
        </div>

        <!-- PROFILE -->
        <div id="acc-pane-profile" class="acc-pane active">
          <div class="bg-white rounded-2xl border border-[#E5E7EB] p-6 max-w-xl">
            <form id="profile-form" class="flex flex-col gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Họ và tên</label>
                <input id="profile-name" type="text" class="w-full h-11 px-4 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-[#40916C]" />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input id="profile-email" type="email" disabled class="w-full h-11 px-4 rounded-xl border border-gray-200 bg-gray-50 text-gray-500 text-sm" />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Số điện thoại</label>
                <input id="profile-phone" type="tel" class="w-full h-11 px-4 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-[#40916C]" />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Địa chỉ giao hàng</label>
                <input id="profile-address" type="text" class="w-full h-11 px-4 rounded-xl border border-gray-200 text-sm focus:outline-none focus:border-[#40916C]" />
              </div>
              <div class="flex items-center gap-3 pt-2">
                <button type="submit" class="h-11 px-6 bg-[#40916C] hover:bg-[#2D6A4F] text-white rounded-xl font-bold text-sm transition-colors">Lưu thay đổi</button>
                <button type="button" id="logout-btn" class="h-11 px-6 border border-red-200 text-red-600 hover:bg-red-50 rounded-xl font-bold text-sm transition-colors">Đăng xuất</button>
              </div>
            </form>
          </div>
        </div>

        <!-- ORDERS -->
        <div id="acc-pane-orders" class="acc-pane">
          <div id="orders-list" class="flex flex-col gap-4"></div>
          <div id="orders-empty" class="hidden text-center text-gray-500 py-16 bg-white rounded-2xl border border-[#E5E7EB]">
            Bạn chưa có đơn hàng nào. <a href="shop.html" class="text-[#40916C] font-medium hover:underline">Mua sắm ngay</a>
          </div>
        </div>

        <!-- WISHLIST -->
        <div id="acc-pane-wishlist" class="acc-pane">
          <div id="wishlist-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4"></div>
          <div id="wishlist-empty" class="hidden text-center text-gray-500 py-16 bg-white rounded-2xl border border-[#E5E7EB]">
            Chưa có sản phẩm yêu thích nào. <a href="shop.html" class="text-[#40916C] font-medium hover:underline">Khám phá sản phẩm</a>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Invoice detail modal -->
  <div id="invoice-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl p-6 w-full max-w-lg shadow-2xl max-h-[85vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-bold text-[#1F2937]">Chi tiết hóa đơn</h3>
        <button id="btn-close-invoice" class="text-gray-400 hover:text-gray-600"><i data-lucide="x" class="w-5 h-5"></i></button>
      </div>
      <div id="invoice-content"></div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="../JS/cart.js"></script>
  <script src="../JS/account.js"></script>
  <script src="../JS/dom.js"></script>
  <script src="../Ajax/fetch-orders.js"></script>
  <script src="../Ajax/fetch-products.js"></script>
  <script>
    var currentOrders = [];

    function showAuthError(elId, message) {
      var el = document.getElementById(elId);
      el.textContent = message;
      el.classList.remove('hidden');
    }

    function setupAuthTabs() {
      document.querySelectorAll('.auth-tab').forEach(function (tab) {
        tab.addEventListener('click', function () {
          document.querySelectorAll('.auth-tab').forEach(function (t) { t.classList.remove('active'); });
          document.querySelectorAll('.auth-pane').forEach(function (p) { p.classList.remove('active'); });
          tab.classList.add('active');
          document.getElementById('auth-pane-' + tab.dataset.authTab).classList.add('active');
        });
      });
    }

    function setupAccTabs() {
      document.querySelectorAll('.acc-tab').forEach(function (tab) {
        tab.addEventListener('click', function () { activateAccTab(tab.dataset.accTab); });
      });
    }

    function activateAccTab(tabName) {
      document.querySelectorAll('.acc-tab').forEach(function (t) { t.classList.toggle('active', t.dataset.accTab === tabName); });
      document.querySelectorAll('.acc-pane').forEach(function (p) { p.classList.toggle('active', p.id === 'acc-pane-' + tabName); });
    }

    function renderAccountView(customer) {
      document.getElementById('guest-view').classList.add('hidden');
      document.getElementById('account-view').classList.remove('hidden');
      document.getElementById('account-avatar').textContent = customer.name.charAt(0).toUpperCase();
      document.getElementById('account-greeting').textContent = 'Xin chào, ' + customer.name;
      document.getElementById('account-email').textContent = customer.email;
      document.getElementById('profile-name').value = customer.name || '';
      document.getElementById('profile-email').value = customer.email || '';
      document.getElementById('profile-phone').value = customer.phone || '';
      document.getElementById('profile-address').value = customer.address || '';

      loadOrders(customer.email);
      loadWishlist();
    }

    function renderOrderCard(order) {
      var status = ORDER_STATUS_LABELS[order.status];
      var itemsSummary = order.items.map(function (i) { return i.name + ' x' + i.quantity; }).join(', ');
      return (
        '<div class="order-card bg-white rounded-2xl border border-[#E5E7EB] p-5 cursor-pointer hover:border-[#40916C] transition-colors" data-id="' + order.id + '">' +
          '<div class="flex justify-between items-start gap-4 mb-3">' +
            '<div>' +
              '<div class="font-bold text-[#1B4332]">Đơn hàng #' + order.id + '</div>' +
              '<div class="text-[12px] text-gray-500">' + order.date + '</div>' +
            '</div>' +
            '<span class="text-xs font-bold px-2 py-1 rounded ' + status.className + ' whitespace-nowrap">' + status.label + '</span>' +
          '</div>' +
          '<p class="text-[13px] text-gray-600 line-clamp-1 mb-3">' + itemsSummary + '</p>' +
          '<div class="flex justify-between items-center border-t border-gray-100 pt-3">' +
            '<span class="text-[12px] text-gray-500">' + order.items.length + ' sản phẩm</span>' +
            '<span class="font-bold text-[#40916C]">' + formatPrice(order.total) + '</span>' +
          '</div>' +
        '</div>'
      );
    }

    function loadOrders(email) {
      getOrdersForCustomer(email).then(function (orders) {
        currentOrders = orders;
        var list = document.getElementById('orders-list');
        var empty = document.getElementById('orders-empty');
        if (orders.length === 0) {
          list.innerHTML = '';
          empty.classList.remove('hidden');
          return;
        }
        empty.classList.add('hidden');
        list.innerHTML = orders.map(renderOrderCard).join('');
      });
    }

    function openInvoice(order) {
      var status = ORDER_STATUS_LABELS[order.status];
      var subtotal = order.total - order.shippingFee;
      var rowsHtml = order.items.map(function (item) {
        return (
          '<div class="flex justify-between text-sm py-2 border-b border-gray-50">' +
            '<span class="text-gray-600">' + item.name + ' <span class="text-gray-400">x' + item.quantity + '</span></span>' +
            '<span class="font-medium text-[#1F2937]">' + formatPrice(item.price * item.quantity) + '</span>' +
          '</div>'
        );
      }).join('');

      document.getElementById('invoice-content').innerHTML =
        '<div class="flex justify-between items-center mb-4">' +
          '<span class="font-bold text-[#1B4332]">#' + order.id + '</span>' +
          '<span class="text-xs font-bold px-2 py-1 rounded ' + status.className + '">' + status.label + '</span>' +
        '</div>' +
        '<div class="text-sm text-gray-600 mb-1"><strong>Địa chỉ giao:</strong> ' + order.shippingAddress + '</div>' +
        '<div class="text-sm text-gray-600 mb-1"><strong>Thanh toán:</strong> ' + paymentMethodLabel(order.paymentMethod) + '</div>' +
        '<div class="text-sm text-gray-600 mb-4"><strong>Ngày đặt:</strong> ' + order.date + '</div>' +
        '<div class="border-t border-gray-100 pt-2">' + rowsHtml + '</div>' +
        '<div class="flex justify-between text-sm pt-3"><span class="text-gray-500">Tạm tính</span><span>' + formatPrice(subtotal) + '</span></div>' +
        '<div class="flex justify-between text-sm py-1"><span class="text-gray-500">Phí giao hàng</span><span>' + (order.shippingFee ? formatPrice(order.shippingFee) : 'Miễn phí') + '</span></div>' +
        '<div class="flex justify-between font-bold text-[#1B4332] text-lg pt-2 border-t border-gray-100 mt-2"><span>Tổng cộng</span><span>' + formatPrice(order.total) + '</span></div>';

      var modal = document.getElementById('invoice-modal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function loadWishlist() {
      var ids = getWishlist();
      var grid = document.getElementById('wishlist-grid');
      var empty = document.getElementById('wishlist-empty');
      if (ids.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      fetch('../XML+Json/products.json').then(function (res) { return res.json(); }).then(function (products) {
        var merged = applyProductOverlay(products).concat(getExtraProducts());
        var items = merged.filter(function (p) { return ids.indexOf(String(p.id)) > -1; });
        renderProductGrid(items, 'wishlist-grid');
      });
    }

    document.addEventListener('DOMContentLoaded', function () {
      document.getElementById('navbar-container').innerHTML = renderNavbar();
      document.getElementById('footer-container').innerHTML = renderFooter();
      setupMobileMenu();
      updateCartBadge();
      lucide.createIcons();

      setupAuthTabs();
      setupAccTabs();

      var params = new URLSearchParams(window.location.search);
      var tab = params.get('tab');

      var customer = getCurrentCustomer();
      if (customer) {
        renderAccountView(customer);
        if (tab) activateAccTab(tab);
      } else {
        document.getElementById('guest-view').classList.remove('hidden');
      }

      document.getElementById('login-form').addEventListener('submit', function (e) {
        e.preventDefault();
        var email = document.getElementById('login-email').value.trim();
        var password = document.getElementById('login-password').value;
        var result = loginCustomer(email, password);
        if (!result.ok) {
          showAuthError('login-error', result.error);
          return;
        }
        window.location.reload();
      });

      document.getElementById('register-form').addEventListener('submit', function (e) {
        e.preventDefault();
        var result = registerCustomer({
          name: document.getElementById('reg-name').value.trim(),
          email: document.getElementById('reg-email').value.trim(),
          phone: document.getElementById('reg-phone').value.trim(),
          password: document.getElementById('reg-password').value
        });
        if (!result.ok) {
          showAuthError('register-error', result.error);
          return;
        }
        window.location.reload();
      });

      document.getElementById('profile-form').addEventListener('submit', function (e) {
        e.preventDefault();
        updateCurrentCustomer({
          name: document.getElementById('profile-name').value.trim(),
          phone: document.getElementById('profile-phone').value.trim(),
          address: document.getElementById('profile-address').value.trim()
        });
        showToast('Đã lưu thông tin tài khoản');
        document.getElementById('navbar-container').innerHTML = renderNavbar();
        lucide.createIcons();
        setupMobileMenu();
        document.getElementById('account-greeting').textContent = 'Xin chào, ' + getCurrentCustomer().name;
      });

      document.getElementById('logout-btn').addEventListener('click', function () {
        logoutCustomer();
        window.location.reload();
      });

      document.getElementById('orders-list').addEventListener('click', function (e) {
        var card = e.target.closest('.order-card');
        if (!card) return;
        var order = currentOrders.find(function (o) { return o.id === card.dataset.id; });
        if (order) openInvoice(order);
      });

      document.getElementById('btn-close-invoice').addEventListener('click', function () {
        document.getElementById('invoice-modal').classList.add('hidden');
        document.getElementById('invoice-modal').classList.remove('flex');
      });
    });
  </script>
</body>
</html>
